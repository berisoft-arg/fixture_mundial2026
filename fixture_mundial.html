<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture Copa Mundial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans p-6">

    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-5xl font-black text-yellow-500 tracking-wider uppercase">Fixture Copa Mundial 2026</h1>
            <p class="text-gray-400 mt-2 text-base">Los datos se guardan solos en el navegador. Usá los botones para respaldar o compartir.</p>
        </header>

        <div class="flex justify-center space-x-4 mb-6 bg-gray-800 p-4 rounded-xl border border-gray-700 max-w-md mx-auto">
            <button onclick="exportarBackup()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded transition cursor-pointer">
                📤 Exportar Backup
            </button>
            <label class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-2 px-4 rounded transition cursor-pointer text-center">
                📥 Importar Backup
                <input type="file" id="input-importar" accept=".json" onchange="importarBackup(this)" class="hidden">
            </label>
        </div>

        <div class="flex justify-center space-x-2 mb-8 border-b border-gray-700 pb-px">
            <button id="btn-tab-grupos" onclick="cambiarTab('grupos')" class="px-6 py-3 font-bold text-base uppercase rounded-t-lg transition border-b-2 cursor-pointer border-yellow-500 text-yellow-500 bg-gray-800/50">
                Fase de Grupos
            </button>
            <button id="btn-tab-final" onclick="cambiarTab('final')" class="px-6 py-3 font-bold text-base uppercase rounded-t-lg transition border-b-2 cursor-pointer border-transparent text-gray-400 hover:text-gray-200">
                Fase Final
            </button>
        </div>

        <main>
            <div id="vista-grupos" class="space-y-10"></div>

            <div id="vista-terceros-wrapper" class="hidden">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 text-center">
                    <h2 class="text-2xl font-bold text-yellow-500 mb-4 uppercase">Tabla de Mejores Terceros</h2>
                    <div class="overflow-x-auto bg-gray-900/60 rounded-lg p-3 border border-gray-700/50 max-w-4xl mx-auto">
                        <table class="w-full text-left text-sm min-w-[550px]">
                            <thead>
                                <tr class="text-gray-400 border-b border-gray-700/50 font-mono text-xs">
                                    <th class="pb-2 pl-2">Grupo</th>
                                    <th class="pb-2">Equipo</th>
                                    <th class="pb-2 text-center w-10">PJ</th>
                                    <th class="pb-2 text-center w-10">G</th>
                                    <th class="pb-2 text-center w-10">E</th>
                                    <th class="pb-2 text-center w-10">P</th>
                                    <th class="pb-2 text-center w-10">GF</th>
                                    <th class="pb-2 text-center w-10">GC</th>
                                    <th class="pb-2 text-center w-10">DG</th>
                                    <th class="pb-2 text-center w-12 font-bold text-yellow-500">Pts</th>
                                    <th class="pb-2 text-center w-16">Manual</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-terceros-general" class="divide-y divide-gray-800/40"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="vista-final" class="hidden space-y-10">
                <div class="space-y-12">
                    <div>
                        <h2 class="text-2xl font-black text-yellow-500 mb-4 border-b border-gray-700 pb-2 uppercase tracking-wide">Dieciseisavos de Final</h2>
                        <div id="contenedor-16avos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-yellow-500 mb-4 border-b border-gray-700 pb-2 uppercase tracking-wide">Octavos de Final</h2>
                        <div id="contenedor-octavos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-yellow-500 mb-4 border-b border-gray-700 pb-2 uppercase tracking-wide">Cuartos de Final</h2>
                        <div id="contenedor-cuartos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <h2 class="text-2xl font-black text-yellow-500 mb-4 border-b border-gray-700 pb-2 uppercase tracking-wide">Semifinales</h2>
                            <div id="contenedor-semis" class="space-y-4"></div>
                        </div>
                        <div>
                            <h2 class="text-2xl font-black text-red-500 mb-4 border-b border-gray-700 pb-2 uppercase tracking-wide">Tercer Puesto</h2>
                            <div id="contenedor-tercer-puesto" class="space-y-4"></div>
                        </div>
                        <div>
                            <h2 class="text-2xl font-black text-green-500 mb-4 border-b border-gray-700 pb-2 uppercase tracking-wide">Final</h2>
                            <div id="contenedor-final" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

        window.actualizarResultado = function(id, tipo, valor) {
            const partido = fixture.partidos.find(p => p.id === id);
            if (partido) {
                if (tipo === 'l') partido.golesL = valor !== "" ? parseInt(valor) : "";
                if (tipo === 'v') partido.golesV = valor !== "" ? parseInt(valor) : "";

                calcularTablas();
            }

        window.moverPosicion = function(contexto, grupoKey, index, direccion) {
            let lista;
            
            if (contexto === 'grupo') {
                if (!fixture.ordenManual[grupoKey] || fixture.ordenManual[grupoKey].length === 0) {
                    const filas = document.querySelectorAll(`#tabla-${grupoKey} tr`);
                    let nombresActuales = [];
                    filas.forEach(f => {
                        let txt = f.cells[1].innerText || f.cells[1].textContent;
                        nombresActuales.push(txt.trim());
                    });
                    fixture.ordenManual[grupoKey] = nombresActuales;
                }
                
                lista = [...fixture.ordenManual[grupoKey]];
                let nuevoIndex = index + direccion;
                if (nuevoIndex >= 0 && nuevoIndex < lista.length) {
                    let temp = lista[index]; 
                    lista[index] = lista[nuevoIndex]; 
                    lista[nuevoIndex] = temp;
                    fixture.ordenManual[grupoKey] = lista;
                }
                
            } else if (contexto === 'terceros') {
                if (!fixture.ordenManual['terceros_lista'] || fixture.ordenManual['terceros_lista'].length === 0) {
                    const filas = document.querySelectorAll(`#tabla-terceros-general tr`);
                    let llavesActuales = [];
                    filas.forEach(f => {
                        let gId = f.cells[0].textContent.replace("Grup.", "").trim();
                        let txt = f.cells[1].querySelector('span').textContent;
                        llavesActuales.push(`${gId}:${txt.trim()}`);
                    });
                    fixture.ordenManual['terceros_lista'] = llavesActuales;
                }
        
                lista = [...fixture.ordenManual['terceros_lista']];
                let nuevoIndex = index + direccion;
                if (nuevoIndex >= 0 && nuevoIndex < lista.length) {
                    let temp = lista[index]; 
                    lista[index] = lista[nuevoIndex]; 
                    lista[nuevoIndex] = temp;
                    fixture.ordenManual['terceros_lista'] = lista;
                }
            }
            
            localStorage.setItem('fixture_mundial_v8', JSON.stringify(fixture));
            calcularTablas();
        }

        function calcularTablas() {
            let todosLosTerceros = [];
            let clasificadosEstructura = {}; 
        
            Object.keys(fixture.grupos).forEach(letraGrupo => {
                let tabla = {};
                fixture.grupos[letraGrupo].forEach(eq => {
                    tabla[eq] = { nombre: eq, grupo: letraGrupo, pts: 0, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0 };
                });
        
                fixture.partidos.filter(p => p.grupo === letraGrupo).forEach(p => {
                    if (p.golesL !== "" && p.golesV !== "") {
                        let gl = parseInt(p.golesL); let gv = parseInt(p.golesV);
                        tabla[p.local].pj++; tabla[p.visitante].pj++;
                        tabla[p.local].gf += gl; tabla[p.local].gc += gv;
                        tabla[p.visitante].gf += gv; tabla[p.visitante].gc += gl;
                        if (gl > gv) { tabla[p.local].pts += 3; tabla[p.local].g++; tabla[p.visitante].p++; }
                        else if (gl < gv) { tabla[p.visitante].pts += 3; tabla[p.visitante].g++; tabla[p.local].p++; }
                        else { tabla[p.local].pts += 1; tabla[p.visitante].pts += 1; tabla[p.local].e++; tabla[p.visitante].e++; }
                    }
                });
        
                let celdas = Object.values(tabla).map(eq => { eq.dg = eq.gf - eq.gc; return eq; })
                    .sort((a, b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);
        
                if (fixture.ordenManual[letraGrupo] && fixture.ordenManual[letraGrupo].length > 0) {
                    celdas.sort((a, b) => fixture.ordenManual[letraGrupo].indexOf(a.nombre) - fixture.ordenManual[letraGrupo].indexOf(b.nombre));
                }
        
                clasificadosEstructura[`1${letraGrupo}`] = celdas[0].nombre;
                clasificadosEstructura[`2${letraGrupo}`] = celdas[1].nombre;
        
                const cuerpo = document.getElementById(`tabla-${letraGrupo}`);
                if (cuerpo) {
                    cuerpo.innerHTML = '';
                    celdas.forEach((eq, idx) => {
                        let bgClase = idx < 2 ? "bg-green-950/20 text-green-200" : (idx === 2 ? "bg-blue-950/20 text-blue-200" : "bg-gray-800/10");

                                <td class="text-center">${eq.gf}</td><td class="text-center">${eq.gc}</td>
                                <td class="text-center font-bold ${eq.dg > 0 ? 'text-green-400' : eq.dg < 0 ? 'text-red-400' : 'text-gray-400'}">${eq.dg > 0 ? '+' + eq.dg : eq.dg}</td>
                                <td class="text-center font-bold text-yellow-400 bg-gray-900/30">${eq.pts}</td>
                                <td class="text-center py-1 font-sans">
                                    <button onclick="moverPosicion('grupo', '${letraGrupo}', ${idx}, -1)" class="px-0.5 text-gray-400 hover:text-yellow-400 font-bold font-sans cursor-pointer">▲</button>
                                    <button onclick="moverPosicion('grupo', '${letraGrupo}', ${idx}, 1)" class="px-0.5 text-gray-400 hover:text-yellow-400 font-bold font-sans cursor-pointer">▼</button>
                                </td>
                            </tr>
                        `;
                    });
                }
                todosLosTerceros.push(celdas[2]);
            });

            procesarBolsaTerceros(todosLosTerceros, clasificadosEstructura);
        }

        function procesarBolsaTerceros(listaTerceros, clasificadosEstructura) {
            // 1. Orden deportivo puro para el estado inicial
            let ordenDeportivoPuro = [...listaTerceros].sort((a, b) => {
                return (b.pts - a.pts) || (b.dg - a.dg) || (b.gf - a.gf);
            });

            const actualesClaves = ordenDeportivoPuro.map(t => `${t.grupo}:${t.nombre}`);
            
            // 2. Sincronización con el orden manual del usuario
            if (!fixture.ordenManual['terceros_lista'] || fixture.ordenManual['terceros_lista'].length === 0) {
                fixture.ordenManual['terceros_lista'] = actualesClaves;
            } else {
                let guardados = fixture.ordenManual['terceros_lista'].filter(k => actualesClaves.includes(k));
                actualesClaves.forEach(k => { 
                    if(!guardados.includes(k)) guardados.push(k); 
                });
                fixture.ordenManual['terceros_lista'] = guardados;
            }
            
            // 3. Ordenamiento definitivo por la selección manual (Tu tabla visual)
            listaTerceros.sort((a, b) => {
                let indexA = fixture.ordenManual['terceros_lista'].indexOf(`${a.grupo}:${a.nombre}`);
                let indexB = fixture.ordenManual['terceros_lista'].indexOf(`${b.grupo}:${b.nombre}`);
                return indexA - indexB;
            });

            // 4. Render de la tabla visual
            const cuerpoTerceros = document.getElementById('tabla-terceros-general');
            if (cuerpoTerceros) {
                cuerpoTerceros.innerHTML = '';
                listaTerceros.forEach((eq, idx) => {

                            <td class="text-center">${eq.pj}</td><td class="text-center">${eq.g}</td><td class="text-center">${eq.e}</td><td class="text-center">${eq.p}</td>

            // 5. OBTENCIÓN DE LOS 8 CLASIFICADOS Y GENERACIÓN DE KEY ALFABÉTICA
            const mejores8Terceros = listaTerceros.slice(0, 8);
            
            // Mapeamos las letras de los grupos de los 8 clasificados y las ordenamos alfabéticamente para la Key
            const claveCombinacion = mejores8Terceros.map(t => t.grupo).sort().join('');
            
            // Buscamos la asignación oficial de la FIFA en tu dataset (ej: retorna {"1E": "B", "1I": "F", ...})
            let mapeoTercerosAsignados = DATASET_FIFA[claveCombinacion];
            
            if (!mapeoTercerosAsignados) {

            // Lógica crucial: El dataset te dice qué GRUPO va a parar a cada posición de 16avos (ej: "1E" recibe al tercero del grupo "B")

            window.cacheEquiposMatch = {};

            // Lógica de cascada para fases posteriores
            let resolverGanador = (faseKey, matchId, fallbackText) => {

            const llavesCuartos = [
                { id: 97, L: resolverGanador("89-96", 89, "Ganador 89"), V: resolverGanador("89-96", 90, "Ganador 90"), t: "09/07", h: "17:00" },
                { id: 98, L: resolverGanador("89-96", 93, "Ganador 93"), V: resolverGanador("89-96", 94, "Ganador 94"), t: "10/07", h: "16:00" },
                { id: 99, L: resolverGanador("89-96", 91, "Ganador 91"), V: resolverGanador("89-96", 92, "Ganador 92"), t: "11/07", h: "18:00" },
                { id: 100, L: resolverGanador("89-96", 95, "Ganador 95"), V: resolverGanador("89-96", 96, "Ganador 96"), t: "11/07", h: "22:00" }
            ];

            llavesCuartos.forEach(p => {
                window.cacheEquiposMatch[`97-100_${p.id}_L`] = p.L;
                window.cacheEquiposMatch[`97-100_${p.id}_V`] = p.V;
            });

            const llavesSemis = [
                { id: 101, L: resolverGanador("97-100", 97, "Ganador 97"), V: resolverGanador("97-100", 98, "Ganador 98"), t: "14/07", h: "16:00" },
                { id: 102, L: resolverGanador("97-100", 99, "Ganador 99"), V: resolverGanador("97-100", 100, "Ganador 100"), t: "15/07", h: "16:00" }
            ];

            llavesSemis.forEach(p => {
                window.cacheEquiposMatch[`101-102_${p.id}_L`] = p.L;
                window.cacheEquiposMatch[`101-102_${p.id}_V`] = p.V;
            });

            const llaveTercero = [{ id: 103, L: resolverPerdedor("101-102", 101, "Perdedor 101"), V: resolverPerdedor("101-102", 102, "Perdedor 102"), t: "18/07", h: "18:00" }];
            const llaveFinal = [{ id: 104, L: resolverGanador("101-102", 101, "Ganador 101"), V: resolverGanador("101-102", 102, "Ganador 102"), t: "19/07", h: "16:00" }];

            renderizarFase('contenedor-16avos', llaves16avos);
            renderizarFase('contenedor-octavos', llavesOctavos);
            renderizarFase('contenedor-cuartos', llavesCuartos);
            renderizarFase('contenedor-semis', llavesSemis);
            renderizarFase('contenedor-tercer-puesto', llaveTercero);
            renderizarFase('contenedor-final', llaveFinal);

            localStorage.setItem('fixture_mundial_v8', JSON.stringify(fixture));
        }

        function renderizarFase(contenedorId, partidos) {
            const contenedor = document.getElementById(contenedorId);
            if (!contenedor) return;
            contenedor.innerHTML = '';

            partidos.forEach(p => {
                const golesL = fixture.golesFaseFinal[`${p.id}_L`] ?? "";
                const golesV = fixture.golesFaseFinal[`${p.id}_V`] ?? "";

                contenedor.innerHTML += `
                    <div class="bg-gray-700/30 p-3 rounded-xl border border-gray-700/60 flex flex-col justify-between shadow-md">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-mono bg-gray-900 px-2 py-0.5 rounded text-yellow-500 font-bold">PARTIDO ${p.id}</span>
                            <span class="text-[10px] font-mono text-gray-400">${p.t} ${p.h || ''}</span>
                        </div>
                        <div class="space-y-2">
                            <div class="flex items-center justify-between text-sm">
                                <div class="flex items-center space-x-2 truncate max-w-[75%]">
                                    ${obtenerBandera(p.L)}
                                    <span class="font-bold truncate text-gray-200">${p.L || "Por definir"}</span>
                                </div>
                                <input type="number" min="0" value="${golesL}" 
                                    oninput="cambiarGolesFaseFinal(${p.id}, 'L', this.value)"
                                    class="w-9 text-center bg-gray-900 text-green-400 font-black rounded p-0.5 border border-gray-600 focus:outline-none">
                            </div>
                            <div class="flex items-center justify-between text-sm">
                                <div class="flex items-center space-x-2 truncate max-w-[75%]">
                                    ${obtenerBandera(p.V)}
                                    <span class="font-bold truncate text-gray-200">${p.V || "Por definir"}</span>
                                </div>
                                <input type="number" min="0" value="${golesV}" 
                                    oninput="cambiarGolesFaseFinal(${p.id}, 'V', this.value)"
                                    class="w-9 text-center bg-gray-900 text-green-400 font-black rounded p-0.5 border border-gray-600 focus:outline-none">
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.cambiarGolesFaseFinal = function(matchId, tipo, valor) {
            fixture.golesFaseFinal[`${matchId}_${tipo}`] = valor !== "" ? parseInt(valor) : "";
            localStorage.setItem('fixture_mundial_v8', JSON.stringify(fixture));
            calcularTablas(); 
        }

        window.exportarBackup = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(fixture));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "backup_fixture.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click(); downloadAnchor.remove();
        }

        window.importarBackup = function(input) {
            const file = input.files[0]; if (!file) return;
            const lector = new FileReader();
            lector.onload = function(e) {
                try {
                    const datosImportados = JSON.parse(e.target.result);
                    if (datosImportados.partidos && datosImportados.grupos) {
                        fixture = datosImportados;
                        localStorage.setItem('fixture_mundial_v8', JSON.stringify(fixture));
                        renderizarMundial(); calcularTablas();
                        alert("Backup importado con éxito.");
                    } else { alert("Formato incorrecto."); }
                } catch (err) { alert("Error al leer archivo."); }
            };
            lector.readAsText(file);
        }

        renderizarMundial();
        calcularTablas();
        cambiarTab(fixture.tabActiva);
    </script>
</body>
</html>
